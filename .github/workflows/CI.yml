name: 🎡 CI

on:
  push:
    paths:
      - '.github/workflows/CI.yml'
      - '.github/workflows/_test-choco-package.yml'
      - 'packages/**'
  workflow_dispatch:

jobs:
  choco:
    uses: kamack38/packages/.github/workflows/_test-choco-package.yml@main
    with:
      packages: >-
        [
          '7tt',
          'action',
          'blitz.gg',
          'borderlessminecraft',
          'croc',
          'eza',
          'jarfix',
          'onefetch',
          'portmaster',
          'shfmt',
          'tcno-acc-switcher',
          'tree-sitter',
          'windhawk',
        ]

  generate-aur-matrix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 🧬 Generate matrix
        id: gen-matrix
        env:
          EXCLUDE: "dwall-git kawaiki-grub2-themes-git termdbms-git up-metro-for-steam-skin"
        run: bash ./gen-matrix.sh
    outputs:
      packages: ${{ steps.gen-matrix.outputs.packages }}
  aur:
    runs-on: ubuntu-latest
    needs: generate-aur-matrix
    strategy:
      fail-fast: false
      matrix:
        pkgname: ${{ fromJson(needs.generate-aur-matrix.outputs.packages) }}
    steps:
      - name: 📚 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: 🛠️ Check PKGBUILD
        id: build-test
        uses: ouuan/pkgbuild-action@master
        with:
          path: ./packages/${{ matrix.pkgname }}
